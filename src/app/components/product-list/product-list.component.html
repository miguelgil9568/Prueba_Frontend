<div class="product-list-container">
  <div class="header">
    <h1>Catálogo de Productos</h1>
    <div class="sort-controls">
      <label for="sort">Ordenar por:</label>
      <select id="sort" (change)="onSortChange($event)" class="sort-select">
        <option value="title">Nombre (A-Z)</option>
        <option value="priceAsc">Precio (Menor a Mayor)</option>
        <option value="priceDesc">Precio (Mayor a Menor)</option>
        <option value="ratingAsc">Calificación (Menor a Mayor)</option>
        <option value="ratingDesc">Calificación (Mayor a Menor)</option>
      </select>
    </div>
  </div>

  <div *ngIf="loading" class="loading">Cargando productos...</div>

  <div class="products-grid">
    <div *ngFor="let product of filteredProducts" class="product-card">
      <div class="image-carousel">
        <img [src]="product.images[currentImageIndex[product.id]]" alt="{{ product.title }}" class="product-image">
        <div *ngIf="product.images.length > 1" class="carousel-controls">
          <button (click)="prevImage(product.id)" class="btn-carousel">❮</button>
          <span class="image-counter">{{ currentImageIndex[product.id] + 1 }}/{{ product.images.length }}</span>
          <button (click)="nextImage(product.id)" class="btn-carousel">❯</button>
        </div>
      </div>
      
      <div class="product-info">
        <h3 class="product-title">{{ product.title }}</h3>
        <p class="product-category">{{ product.category }}</p>
        
        <div class="product-meta">
          <span class="price">${{ product.price | number: '1.2-2' }}</span>
          <span class="rating">⭐ {{ product.rating }}</span>
        </div>
        
        <div class="stock-status" [class.out-of-stock]="product.stock === 0">
          <span>Stock: {{ product.stock > 0 ? product.stock : 'Agotado' }}</span>
        </div>
        
        <div class="product-actions">
          <button (click)="viewDetail(product)" class="btn btn-detail">Ver Detalle</button>
          <button (click)="addToCart(product)" class="btn btn-add-cart" [disabled]="product.stock === 0">
            Agregar al Carrito
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
