<div class="product-list-container">
  <div class="header">
      <div>
      <h1>Catálogo de Productos</h1>
    </div>
    <div class="sort-controls">
      <label for="sort">Ordenar por:</label>
      <p-dropdown 
        id="sort"
        [options]="sortOptions" 
        [(ngModel)]="sortBy"
        optionLabel="label"
        optionValue="value"
        (onChange)="onSortChange($event)"
        styleClass="w-full">
      </p-dropdown>
    </div>
  </div>

  <div *ngIf="loading" class="loading">
    <i class="pi pi-spin pi-spinner" style="font-size: 2rem; color: #007bff;"></i>
    <p>Cargando productos...</p>
  </div>

  <div class="products-grid" *ngIf="!loading">
    <p-card *ngFor="let product of filteredProducts" class="product-card">
      <ng-template pTemplate="header">
        <div class="image-carousel">
          <img [src]="product.images[currentImageIndex[product.id]]" alt="{{ product.title }}" class="product-image">
          <div *ngIf="product.images.length > 1" class="carousel-controls">
            <p-button 
              icon="pi pi-chevron-left" 
              (click)="prevImage(product.id)"
              [rounded]="true"
              [text]="true"
              severity="secondary">
            </p-button>
            <span class="image-counter">{{ currentImageIndex[product.id] + 1 }}/{{ product.images.length }}</span>
            <p-button 
              icon="pi pi-chevron-right" 
              (click)="nextImage(product.id)"
              [rounded]="true"
              [text]="true"
              severity="secondary">
            </p-button>
          </div>
        </div>
      </ng-template>
      
      <h3 class="product-title">{{ product.title }}</h3>
      <label>{{ product.category }}</label>
      
      <div class="product-meta">
        <span class="price"><strong>${{ product.price | number: '1.2-2' }}</strong></span>
        <p-rating [(ngModel)]="product.rating" [readonly]="true" [cancel]="false"></p-rating>
      </div>
      
      <div class="stock-status" [ngClass]="{'out-of-stock': product.stock === 0}">
        <i class="pi" [ngClass]="product.stock > 0 ? 'pi-check-circle' : 'pi-times-circle'"></i>
        <span>{{ product.stock > 0 ? 'Stock: ' + product.stock : 'Agotado' }}</span>
      </div>
      
      <ng-template pTemplate="footer">
        <div class="product-actions">
          <p-button 
            label="Ver Detalle" 
            icon="pi pi-info-circle"
            (click)="viewDetail(product)"
            [text]="true"
            size="small"
            severity="info">
          </p-button>
          <p-button 
            label="Agregar" 
            icon="pi pi-shopping-cart"
            (click)="addToCart(product)"
            [disabled]="product.stock === 0"
            size="small"
            severity="success">
          </p-button>
        </div>
      </ng-template>
    </p-card>
